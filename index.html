<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI ブログジェネレーター</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0f0e0c; --paper: #f5f0e8; --cream: #ede8da; --accent: #c8401a; --border: #ccc4b4; }
    body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif JP', serif; padding: 1.5rem; }
    .container { max-width: 800px; margin: 0 auto; background: var(--cream); padding: 2rem; border: 1px solid var(--border); position: relative; }
    .container::before { content: ''; position: absolute; top: 5px; left: 5px; right: -5px; bottom: -5px; border: 1px solid var(--border); z-index: -1; }
    h2 { font-family: 'Syne', sans-serif; font-weight: 800; margin-bottom: 1rem; color: var(--ink); }
    label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem; color: #7a7268; }
    input, select { width: 100%; padding: 0.8rem; margin-bottom: 1.2rem; border: 1px solid var(--border); background: var(--paper); font-family: inherit; }
    .generate-btn { width: 100%; padding: 1.2rem; background: var(--accent); color: white; border: none; font-family: 'Syne', sans-serif; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #output { margin-top: 3rem; display: none; border-top: 3px solid var(--ink); padding-top: 2rem; }
    .blog-category { display: inline-block; background: #2a6049; color: white; font-size: 0.7rem; padding: 0.2rem 0.6rem; margin-bottom: 1rem; font-family: 'Syne', sans-serif; }
    #outputContent { line-height: 1.8; }
    .loading { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

<div class="container">
  <h2>AI<span>Blog</span> Generator</h2>
  <p style="font-size: 0.8rem; color: #7a7268; margin-bottom: 2rem;">豊かな創造の時間を、AIと共に。</p>

  <label>テーマ・トピック</label>
  <input type="text" id="topic" placeholder="例: 美容師からみた40代の健康と美容">

  <label>カテゴリ</label>
  <select id="category">
    <option value="beauty">美容・健康</option>
    <option value="lifestyle">ライフスタイル</option>
    <option value="tech">テクノロジー</option>
    <option value="business">ビジネス</option>
    <option value="food">グルメ</option>
  </select>

  <label>文章のトーン</label>
  <select id="tone">
    <option value="親しみやすく、共感できるスタイル">親しみやすい</option>
    <option value="プロフェッショナルで信頼感のあるスタイル">プロフェッショナル</option>
    <option value="情熱的でワクワクするスタイル">情熱的</option>
  </select>

  <button class="generate-btn" id="generateBtn" onclick="generateBlog()">✦ ブログ記事を生成する</button>

  <div id="output">
    <span class="blog-category" id="outputCategory"></span>
    <h1 id="outputTitle" style="font-size: 1.8rem; margin-bottom: 1.5rem;"></h1>
    <div id="outputContent"></div>
  </div>
</div>

<script>
async function generateBlog() {
  const topic = document.getElementById('topic').value.trim();
  const categorySelect = document.getElementById('category');
  const categoryText = categorySelect.options[categorySelect.selectedIndex].text;
  const tone = document.getElementById('tone').value;
  const btn = document.getElementById('generateBtn');

  if (!topic) {
    alert("テーマを入力してください。");
    return;
  }

  btn.innerText = "AIが記事を執筆中...";
  btn.classList.add('loading');

  try {
    const res = await fetch('/api/generate-blog', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic,
        categoryText,
        tone
      })
    });

   const text = await res.text();
let data;
try {
  data = JSON.parse(text);
} catch {
  throw new Error(`APIがJSONを返していません: ${text}`);
}

    if (!res.ok) {
      throw new Error(data?.error || 'APIエラー');
    }

    document.getElementById('output').style.display = 'block';
    document.getElementById('outputCategory').innerText = categoryText;
    document.getElementById('outputTitle').innerText = topic;
    document.getElementById('outputContent').innerHTML = data.html || '<p>記事を取得できませんでした。</p>';
    window.scrollTo({ top: document.getElementById('output').offsetTop, behavior: 'smooth' });

  catch (e) {
  console.error(e);
  alert(`エラー: ${e.message}\n\n${e.stack || ''}`);
}
  } finally {
    btn.innerText = "✦ ブログ記事を生成する";
    btn.classList.remove('loading');
  }
}
</script>

</body>
</html>
